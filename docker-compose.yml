version: "3.9"

services:

  rag_api:
    build: .
    container_name: rag_agricultura
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data/chroma_db:/app/data/chroma_db
    env_file:
      - .env
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    

volumes:
  ollama_data: